<!DOCTYPE html>
<html>
<head>
    <title>Laundry Reservation System</title>
</head>
<body>

<h2>Laundry Reservation Dashboard</h2>
<button onclick="logout()">Logout</button>
<hr>

<!-- ADMIN SECTION -->
<div id="adminSection" style="display:none;">
    <h3>Add Machine (Admin Only)</h3>

    <input type="text" id="machineType" placeholder="Machine Type (WASHING_MACHINE)">
    <input type="text" id="machineStatus" placeholder="Status (AVAILABLE)">
    <button onclick="createMachine()">Create Machine</button>

    <p id="machineResult"></p>
    <hr>
</div>

<!-- USER SECTION -->
<div id="userSection">
    <h3>Create Reservation</h3>

    <input type="number" id="machineId" placeholder="Machine ID">
    <input type="datetime-local" id="startTime">
    <input type="datetime-local" id="endTime">
    <button onclick="createReservation()">Reserve</button>

    <p id="createResult"></p>

    <hr>

    <h3>Delete Reservation</h3>
    <input type="number" id="deleteId" placeholder="Reservation ID">
    <button onclick="deleteReservation()">Delete</button>

    <p id="deleteResult"></p>

    <hr>

    <h3>Reschedule Reservation</h3>
    <input type="number" id="rescheduleId" placeholder="Reservation ID">
    <input type="datetime-local" id="newStartTime">
    <input type="datetime-local" id="newEndTime">
    <button onclick="rescheduleReservation()">Reschedule</button>

    <p id="rescheduleResult"></p>
</div>

<script>
function logout() {
    localStorage.removeItem("authHeader");
    localStorage.removeItem("role");
    window.location.href = "login.html";
}
</script>

<script src="app.js"></script>

</body>
</html>
